<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>
    <h1>Task Manager 🚀</h1>

    <form action="/add" method="POST">
        <input type="text" name="task" required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li>
                {{ task.task }}
                <a href="/delete/{{ task._id }}">❌</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
